name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (test suite dependencies)
        # rdkit, numpy, pandas, scikit-learn, scipy, pyyaml and joblib all ship
        # manylinux wheels, so the core find_candidates API installs from PyPI
        # without conda. The heavy end-to-end workflow tools (meeko, openbabel,
        # gnina, unidock) are intentionally NOT required for the test suite.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[ci]"

      - name: Show resolved environment
        run: python -c "import screensift, rdkit, pandas, numpy, scipy; print('screensift', screensift.__file__)"

      - name: Run tests
        run: python -m pytest tests/ -q
