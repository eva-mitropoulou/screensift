input:
  path: example/mapk1/expected_outputs/mapk1_2receptor_score_population.csv
  format: csv
  sep: ","

columns:
  smiles: canonical_smiles
  ligand_id: ligand_id
  activity_label: activity_label

activity:
  mode: label
  active_values: ["active"]
  inactive_values: ["inactive"]
  allow_unlabeled: true

deduplicate_by: inchikey
metadata_columns:
  - unidock_best_score
  - ecfp4_active_similarity
  - cnnscore
  - cnnaffinity
  - gnina_affinity
