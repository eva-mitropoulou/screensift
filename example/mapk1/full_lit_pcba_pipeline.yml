# Full MAPK1 / LIT-PCBA run config.
#
# This is the config to review before starting the expensive run.
# It is intentionally set up for the full workflow:
#   full LIT-PCBA MAPK1 ligands
#   -> Uni-Dock native redocking validation
#   -> two validated receptors, 4QTA and 6SLG
#   -> ligand 3D/PDBQT preparation
#   -> Uni-Dock screening
#   -> GNINA Docker GPU score-only rescoring
#   -> GNINA score sanity validation
#   -> optional candidate pose QC with GNINA
#   -> one final candidate CSV
#
# After review, run with:
#   PYTHONPATH=src python -m screensift.pipeline --config example/mapk1/full_lit_pcba_pipeline.yml --force

target: MAPK1
run_id: lit_pcba_full
target_slug: mapk1

workflow:
  # options: ranking_only, full_screening
  mode: full_screening

paths:
  # All generated outputs for this run go here.
  run_dir: runs/mapk1_lit_pcba_full

  # Prepared MAPK1 receptor folders used by docking, redocking, and GNINA.
  receptor_root: data/processed/receptors/MAPK1

dataset:
  # Full LIT-PCBA MAPK1 ligand input schema.
  schema: example/mapk1/lit_pcba_full_schema.yml

screening:
  # Keeps all actives and all inactives. No inactive sampling.
  config: example/mapk1/full_lit_pcba_screening.yml

limits:
  # null means run the full configured LIT-PCBA set.
  ligands: null  # options: null, positive integer

  # false means use both MAPK1 receptors from the docking-box table.
  single_receptor: false  # options: true, false

ligands:
  # Worker count for RDKit conformer generation and Meeko PDBQT conversion.
  n_jobs: 16

  # Per-ligand 3D generation timeout. Hard molecules are marked as failures
  # instead of blocking the whole run indefinitely.
  conformer_timeout_seconds: 120

docking:
  # MAPK1 receptor boxes for 4QTA and 6SLG.
  boxes: example/mapk1/mapk1_docking_boxes.csv

  # Uni-Dock executable discovered locally.
  unidock_bin: /home/dimit/eva/Computational-Chemistry/docking_project/.micromamba/envs/unidock_env/bin/unidock

  # Uni-Dock settings.
  cpu: 16
  exhaustiveness: 8  # options: 4 smoke, 8 normal, 16+ thorough
  max_step: 10  # search steps; leave 10 unless tuning Uni-Dock
  num_modes: 10  # poses kept per ligand; common values: 1, 3, 5, 10
  energy_range: 3  # kcal/mol pose window; common values: 3, 5

gnina:
  # Run GNINA through Docker, with GPU access.
  mode: docker  # options: native, docker
  binary: gnina
  image: gnina/gnina
  gpu: all  # options: all, "0", cpu, null

  # Extra Docker/GNINA args. Keep empty unless debugging container runtime issues.
  docker_args: []
  extra_args: []

  # Per-ligand GNINA timeout.
  timeout_seconds: 1800

  # true means reruns reuse completed GNINA rows when possible.
  resume: true  # options: true, false

  # Number of GNINA score-only jobs to run at once. For Docker/GPU, keep this
  # modest so the machine is not overloaded.
  max_workers: 16  # options: 1 serial, 2-4 conservative, 8+ aggressive
  checkpoint_every: 100

redocking:
  native:
    # Validate the Uni-Dock receptor/box setup with crystallographic ligands
    # before the expensive many-ligand docking stage.
    run: true  # options: true, false

    # false means: report redocking pass/fail but keep both configured receptors.
    # true means: require a redocking-passed docking-box table and use only
    # receptors that pass rmsd_threshold_angstrom for many-ligand screening.
    filter_receptors: false  # options: true, false

    rmsd_threshold_angstrom: 2.0

    # Optional user-defined tuning loop for native redocking.
    # enabled: false means one redocking run uses the docking settings above.
    # enabled: true means ScreenSift tries ONLY the attempts listed below, in order.
    # For each receptor it stops at the first attempt that passes rmsd_threshold_angstrom.
    # box_scale multiplies size_x/size_y/size_z from mapk1_docking_boxes.csv.
    # box_padding_angstrom adds padding to each side, so total size grows by 2 * padding.
    auto_tune:
      enabled: false  # options: true, false
      attempts:
        - name: baseline
          exhaustiveness: 8
          box_scale: 1.0
          box_padding_angstrom: 0.0
        - name: wider_box
          exhaustiveness: 16
          box_scale: 1.2
          box_padding_angstrom: 0.0
        - name: wider_box_more_search
          exhaustiveness: 32
          box_scale: 1.2
          box_padding_angstrom: 2.0

  gnina_score_sanity:
    # Score native/redocked/decoy poses with GNINA to sanity-check rescoring.
    run: true  # options: true, false
    decoy_translation_angstrom: 12.0

candidate_pose_qc:
  # Extra expensive check: redock top candidates with GNINA and compare
  # Uni-Dock-vs-GNINA predicted poses. This is pose agreement, not proof of binding.
  run: true  # options: true, false
  top_n: 25
  consistent_rmsd_angstrom: 2.0
  moderate_rmsd_angstrom: 4.0

ranking:
  # Empty means use the score table generated by GNINA parsing in this run.
  score_table: ""

  # options: similarity, structure, combined
  evidence_mode: combined

  # Final candidate count.
  n_candidates: 100

  # null means compute ECFP4/Tanimoto similarity from active labels during ranking.
  # Use a column name only when your full score table already has saved similarity values.
  similarity_score_column: null  # options: null, column_name

  # null means auto-detect standard Uni-Dock/GNINA score columns and directions:
  #   unidock_best_score -> lower is better
  #   CNNscore           -> higher is better
  #   CNNaffinity        -> higher is better
  #   gnina_affinity     -> lower is better
  structure_score_columns: null  # options: null, or {column_name: higher/lower}

  # Combine multiple structure score columns into structure_score_norm.
  structure_aggregation: max  # options: max, weighted_mean
  structure_weights: null  # options: null, or {column_name: weight}

  # Combine similarity and structure into the final candidate_score.
  candidate_aggregation: weighted_mean  # options: max, weighted_mean
  candidate_weights:  # options: {structure_score_norm: weight, similarity_score_norm: weight}
    similarity_score_norm: 0.75
    structure_score_norm: 0.25
